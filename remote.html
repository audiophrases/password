<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Password — Remote</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="remote.css" />
</head>
<body class="offline">
  <div id="status" class="status">Connecting…</div>

  <div id="ctx" class="ctx">
    <div class="ctx-top">
      <span id="r-player" class="r-player"></span>
      <span id="r-time" class="r-time"></span>
      <span id="r-score" class="r-score"></span>
    </div>
    <div class="ctx-letter"><span id="r-letter"></span><small id="r-kind"></small></div>
    <p id="r-clue" class="ctx-clue">Open this page on your phone while the game runs on the laptop.</p>
    <div id="r-answer-box" class="ctx-answer">answer <b id="r-answer"></b><span id="r-accept" class="r-accept"></span></div>
    <div id="r-sugg" class="ctx-sugg"></div>
  </div>

  <div class="pad">
    <button class="big ok"   data-act="correct">✓<small>Correct</small></button>
    <button class="big pass" data-act="pass">⏭<small>Pass</small></button>
    <button class="big no"   data-act="wrong">✕<small>Wrong</small></button>
  </div>

  <button data-act="read" class="clue">🔊 Clue</button>

  <details id="r-settings" class="rset">
    <summary>⚙ Game settings</summary>
    <div class="rs-label">Player names</div>
    <div id="rs-players"></div>
    <label>Judging
      <select id="rs-mode">
        <option value="voice-assist">Voice-assist</option>
        <option value="voice-auto">Voice-auto</option>
        <option value="teacher-judge">Teacher-judge</option>
        <option value="type-in">Type-in</option>
      </select>
    </label>
    <label class="rslider">Strictness
      <input id="rs-strict" type="range" min="0" max="1" step="0.05" value="0.7" />
      <output id="rs-strict-out">0.7</output>
    </label>
    <label class="rslider">Speed
      <input id="rs-rate" type="range" min="0.5" max="1.5" step="0.01" value="0.93" />
      <output id="rs-rate-out">0.93</output>
    </label>
    <label class="rslider">Time (s, 0 = ∞)
      <input id="rs-duration" type="number" min="0" max="3600" step="10" value="300" />
    </label>
    <label class="rcheck"><input id="rs-autoread" type="checkbox" checked /> Read clues aloud automatically</label>
    <button id="rs-apply">⚡ Apply to game</button>
  </details>

  <div class="row2">
    <button data-act="start">▶ Start</button>
    <button id="talk">🎤 Hold to talk</button>
    <button data-act="toggle-clue">👁 Text</button>
    <button data-act="pause">⏸ Pause</button>
    <button data-act="camera">📷 Cam</button>
    <button data-act="fullscreen">⛶ Full</button>
    <button data-act="exit">Exit</button>
  </div>

  <script type="module" src="js/remote.js"></script>
</body>
</html>
